<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Müzik</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e23;font-family:-apple-system,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.widget{background:#252529;border-radius:16px;border:1px solid rgba(255,255,255,0.06);padding:16px;width:calc(100% - 4px);height:calc(100% - 4px);display:flex;flex-direction:column;gap:8px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.header{display:flex;align-items:center;gap:8px;margin-bottom:2px}
.drag-btn{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border-radius:8px;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.drag-btn:hover{background:rgba(0,212,255,0.15);color:#00d4ff}
.title{flex:1;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;text-align:center}
.close-btn{width:28px;height:28px;border:none;background:rgba(255,77,77,0.1);color:rgba(255,77,77,0.5);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.close-btn:hover{background:rgba(255,77,77,0.3);color:#ff4d4d}
.player{display:flex;gap:12px;align-items:center;padding:4px 0}
.album-art{width:56px;height:56px;border-radius:12px;object-fit:cover;background:linear-gradient(135deg,#1a1a1f,#252529);flex-shrink:0;border:1px solid rgba(255,255,255,0.04)}
.meta{flex:1;overflow:hidden;min-width:0}
.song-title{font-size:14px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist-name{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
.progress{display:flex;align-items:center;gap:8px;padding:2px 0;cursor:pointer}
.prog-time{font-size:10px;color:rgba(255,255,255,0.3);min-width:28px}
.prog-bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;position:relative}
.prog-fill{height:100%;background:var(--accent,#00d4ff);border-radius:3px;width:0%;transition:width .3s}
.controls{display:flex;justify-content:center;gap:10px;padding:2px 0}
.ctrl-btn{width:34px;height:34px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s}
.ctrl-btn.prev,.ctrl-btn.next{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6)}
.ctrl-btn.prev:hover,.ctrl-btn.next:hover{background:rgba(255,255,255,0.12);color:#fff}
.ctrl-btn.play{width:42px;height:42px;background:rgba(0,212,255,0.15);color:#00d4ff;font-size:16px}
.ctrl-btn.play:hover{background:rgba(0,212,255,0.3);transform:scale(1.05)}
.vol-btn{width:28px;height:28px;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);transition:all .2s}
.vol-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.volume-bar{display:flex;align-items:center;gap:4px;padding:2px 0;justify-content:center}
.volume-slider{-webkit-appearance:none;width:80px;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent,#00d4ff);cursor:pointer}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;color:rgba(255,255,255,0.15);gap:8px;padding:20px}
.empty-state .icon{font-size:36px}
.empty-state .text{font-size:12px}
</style>
</head>
<body>
<div class="widget" id="widget">
<div class="header">
<div class="drag-btn" id="dragBtn"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="pointer-events:none"><circle cx="8" cy="5" r="1.5"/><circle cx="16" cy="5" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="8" cy="19" r="1.5"/><circle cx="16" cy="19" r="1.5"/></svg></div>
<div class="title">Müzik</div>
<button class="close-btn" id="closeBtn">&#10005;</button>
</div>
<div class="player" id="playerArea">
<img class="album-art" id="albumArt">
<div class="meta">
<div class="song-title" id="songTitle">-</div>
<div class="artist-name" id="artistName">-</div>
</div>
</div>
<div class="progress" id="progressArea">
<span class="prog-time" id="currentTime">0:00</span>
<div class="prog-bar" id="progBar"><div class="prog-fill" id="progFill"></div></div>
<span class="prog-time" id="totalTime">0:00</span>
</div>
<div class="controls">
<button class="ctrl-btn prev" id="prevBtn">⏮</button>
<button class="ctrl-btn play" id="playBtn">▶</button>
<button class="ctrl-btn next" id="nextBtn">⏭</button>
</div>
<div class="volume-bar">
<button class="vol-btn" id="volDownBtn">🔉</button>
<input type="range" class="volume-slider" id="volSlider" min="0" max="100" value="50">
<button class="vol-btn" id="volUpBtn">🔊</button>
<button class="vol-btn" id="volMuteBtn">🔇</button>
</div>
<div class="empty-state" id="emptyState" style="display:none">
<div class="icon">🎵</div>
<div class="text">Müzik çalmıyor</div>
</div>
</div>
<script src="../../tauri-bridge.js"></script>
<script>
(function(){var b=document.getElementById('dragBtn');if(!b)return;var d=false,sx=0,sy=0,ox=NaN,oy=NaN;b.addEventListener('mousedown',function(e){e.preventDefault();d=true;sx=e.screenX;sy=e.screenY;ox=NaN;b.classList.add('active');window.plasmaAPI.getWindowPosition().then(function(p){ox=p.x-sx;oy=p.y-sy}).catch(function(){})});document.addEventListener('mousemove',function(e){if(!d||isNaN(ox))return;window.plasmaAPI.moveWindow(e.screenX+ox,e.screenY+oy)});document.addEventListener('mouseup',function(){if(!d)return;d=false;b.classList.remove('active')})})();
document.getElementById('closeBtn').addEventListener('click',function(){window.plasmaAPI.closeWidget('music-player')});
(function(){var c=document.createElement('div');c.style.cssText='position:fixed;right:0;bottom:0;width:10px;height:10px;cursor:nwse-resize;z-index:999';document.body.appendChild(c);var r=document.createElement('div');r.style.cssText='position:fixed;right:0;top:0;width:5px;height:100%;cursor:ew-resize;z-index:999';document.body.appendChild(r);var b2=document.createElement('div');b2.style.cssText='position:fixed;bottom:0;left:0;width:100%;height:5px;cursor:ns-resize;z-index:999';document.body.appendChild(b2);var rs=false,rsx=0,rsy=0,row=0,roh=0,rt='none';c.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='corner';e.preventDefault()});r.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='right';e.preventDefault()});b2.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='bottom';e.preventDefault()});document.addEventListener('mousemove',function(e){if(!rs)return;var dx=e.screenX-rsx,dy=e.screenY-rsy;window.plasmaAPI.setWindowSize('widget-music-player',rt==='corner'||rt==='right'?Math.max(200,row+dx):row,rt==='corner'||rt==='bottom'?Math.max(140,roh+dy):roh)});document.addEventListener('mouseup',function(){rs=false})})();

document.getElementById('playBtn').addEventListener('click',function(){window.plasmaAPI.mediaToggle()});
document.getElementById('prevBtn').addEventListener('click',function(){window.plasmaAPI.mediaPrev('')});
document.getElementById('nextBtn').addEventListener('click',function(){window.plasmaAPI.mediaNext('')});
document.getElementById('volUpBtn').addEventListener('click',function(){window.plasmaAPI.mediaVolumeUp()});
document.getElementById('volDownBtn').addEventListener('click',function(){window.plasmaAPI.mediaVolumeDown()});
document.getElementById('volMuteBtn').addEventListener('click',function(){window.plasmaAPI.mediaMute()});
document.getElementById('progressArea').addEventListener('click',function(e){
var rect=document.getElementById('progBar').getBoundingClientRect();
window.plasmaAPI.mediaSeek((e.clientX-rect.left)/rect.width);
});

async function update(){
try{
var s=await window.plasmaAPI.getMediaSessions();
if(s&&s.length>0){
var song=s[0];
document.getElementById('songTitle').textContent=song.title||song.fullTitle||'-';
document.getElementById('artistName').textContent=song.artist||'-';
document.getElementById('playBtn').innerHTML=song.playbackStatus==='Playing'?'⏸':'▶';
if(song.icon)document.getElementById('albumArt').src='data:image/png;base64,'+song.icon;
else document.getElementById('albumArt').src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23333"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="5" fill="%23222"/></svg>';
document.getElementById('emptyState').style.display='none';
document.getElementById('playerArea').style.display='flex';
}else{
document.getElementById('emptyState').style.display='flex';
document.getElementById('playerArea').style.display='none';
}
}catch(e){}
}
update();setInterval(update,3000);

setInterval(async function(){try{var t=await window.plasmaAPI.getTheme()||'dark';var a=await window.plasmaAPI.getAccentColor()||'#00d4ff';var o=parseFloat(await window.plasmaAPI.getStoreValue('opacity'))||88;var bg={dark:'#1e1e23',light:'#e8e8e8',catppuccin:'#1e1e2e',nord:'#2e3440',dracula:'#282a36'};var wbg={dark:'#252529',light:'#f5f5f5',catppuccin:'#252536',nord:'#3b4252',dracula:'#343746'};document.body.style.background=bg[t]||bg.dark;var w=document.querySelector('.widget');if(w)w.style.background=wbg[t]||wbg.dark;document.body.style.opacity=o/100}catch(e){}},2000);
</script>
</body>
</html>
