<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Saat &amp; Takvim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e23;font-family:-apple-system,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.widget{background:#252529;border-radius:16px;border:1px solid rgba(255,255,255,0.06);padding:16px;width:calc(100% - 4px);height:calc(100% - 4px);display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.drag-btn{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border-radius:8px;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.drag-btn:hover{background:rgba(0,212,255,0.15);color:#00d4ff}
.drag-btn.active{background:#00d4ff;color:#000}
.title{flex:1;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;text-align:center}
.close-btn{width:28px;height:28px;border:none;background:rgba(255,77,77,0.1);color:rgba(255,77,77,0.5);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.close-btn:hover{background:rgba(255,77,77,0.3);color:#ff4d4d}
.clock-body{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.clock-face{width:80px;height:80px;border-radius:50%;background:#1a1a1f;position:relative;border:2px solid rgba(255,255,255,0.06);flex-shrink:0}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom;border-radius:3px}
.hour-hand{width:3px;height:20px;background:#fff;margin-left:-1.5px}
.minute-hand{width:2px;height:28px;background:rgba(255,255,255,0.7);margin-left:-1px}
.second-hand{width:1px;height:32px;background:#00d4ff;margin-left:-0.5px}
.center-dot{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:5px;height:5px;background:#00d4ff;border-radius:50%}
.numbers span{position:absolute;font-size:8px;color:rgba(255,255,255,0.3);width:16px;height:16px;display:flex;align-items:center;justify-content:center;top:50%;left:50%;transform:rotate(calc(30deg * var(--i))) translateY(-30px) rotate(calc(-30deg * var(--i)))}
.digital{flex:1;text-align:right}
.digital .time{font-size:26px;font-weight:200;color:#fff;line-height:1.1;margin-bottom:2px}
.digital .date{font-size:10px;color:rgba(255,255,255,0.4)}
.calendar{background:rgba(0,0,0,0.15);border-radius:12px;padding:10px;flex:1;display:flex;flex-direction:column}
.cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.month-year{font-size:11px;font-weight:600;color:rgba(255,255,255,0.7)}
.nav-btn{width:22px;height:22px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border-radius:6px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.day-name{font-size:8px;color:rgba(255,255,255,0.3);text-align:center;padding:2px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.cal-day{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:rgba(255,255,255,0.5);border-radius:6px;cursor:pointer;transition:all .15s}
.cal-day:hover{background:rgba(255,255,255,0.06)}
.cal-day.today{background:#00d4ff;color:#000;font-weight:600}
.cal-day.other{color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div class="widget" id="widget">
<div class="header">
<div class="drag-btn" id="dragBtn"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="pointer-events:none"><circle cx="8" cy="5" r="1.5"/><circle cx="16" cy="5" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="8" cy="19" r="1.5"/><circle cx="16" cy="19" r="1.5"/></svg></div>
<div class="title">Saat</div>
<button class="close-btn" id="closeBtn">&#10005;</button>
</div>
<div class="clock-body">
<div class="clock-face">
<div class="hand hour-hand" id="hourHand"></div>
<div class="hand minute-hand" id="minuteHand"></div>
<div class="hand second-hand" id="secondHand"></div>
<div class="center-dot"></div>
<div class="numbers">
<span style="--i:1">1</span><span style="--i:2">2</span><span style="--i:3">3</span>
<span style="--i:4">4</span><span style="--i:5">5</span><span style="--i:6">6</span>
<span style="--i:7">7</span><span style="--i:8">8</span><span style="--i:9">9</span>
<span style="--i:10">10</span><span style="--i:11">11</span><span style="--i:12">12</span>
</div>
</div>
<div class="digital">
<div class="time" id="digitalTime">00:00</div>
<div class="date" id="digitalDate"></div>
</div>
</div>
<div class="calendar">
<div class="cal-header">
<button class="nav-btn" id="prevMonth">&#10094;</button>
<span class="month-year" id="monthYear"></span>
<button class="nav-btn" id="nextMonth">&#10095;</button>
</div>
<div class="cal-days">
<div class="day-name">Pzt</div><div class="day-name">Sal</div><div class="day-name">Çar</div>
<div class="day-name">Per</div><div class="day-name">Cum</div><div class="day-name">Cmt</div><div class="day-name">Paz</div>
</div>
<div class="cal-grid" id="calGrid"></div>
</div>
</div>
<script src="../../tauri-bridge.js"></script>
<script>
var aylar=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

(function(){var b=document.getElementById('dragBtn');if(!b)return;var d=false,sx=0,sy=0,ox=NaN,oy=NaN;b.addEventListener('mousedown',function(e){e.preventDefault();d=true;sx=e.screenX;sy=e.screenY;ox=NaN;b.classList.add('active');window.plasmaAPI.getWindowPosition().then(function(p){ox=p.x-sx;oy=p.y-sy}).catch(function(){})});document.addEventListener('mousemove',function(e){if(!d||isNaN(ox))return;window.plasmaAPI.moveWindow(e.screenX+ox,e.screenY+oy)});document.addEventListener('mouseup',function(){if(!d)return;d=false;b.classList.remove('active')})})();
document.getElementById('closeBtn').addEventListener('click',function(){window.plasmaAPI.closeWidget('clock')});
// resize handles
(function(){var c=document.createElement('div');c.style.cssText='position:fixed;right:0;bottom:0;width:10px;height:10px;cursor:nwse-resize;z-index:999';document.body.appendChild(c);var r=document.createElement('div');r.style.cssText='position:fixed;right:0;top:0;width:5px;height:100%;cursor:ew-resize;z-index:999';document.body.appendChild(r);var b2=document.createElement('div');b2.style.cssText='position:fixed;bottom:0;left:0;width:100%;height:5px;cursor:ns-resize;z-index:999';document.body.appendChild(b2);var rs=false,rsx=0,rsy=0,row=0,roh=0,rt='none';c.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='corner';e.preventDefault()});r.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='right';e.preventDefault()});b2.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='bottom';e.preventDefault()});document.addEventListener('mousemove',function(e){if(!rs)return;var dx=e.screenX-rsx,dy=e.screenY-rsy;window.plasmaAPI.setWindowSize('widget-clock',rt==='corner'||rt==='right'?Math.max(180,row+dx):row,rt==='corner'||rt==='bottom'?Math.max(200,roh+dy):roh)});document.addEventListener('mouseup',function(){rs=false})})();

function tick(){
var n=new Date();
document.getElementById('secondHand').style.transform='rotate('+(n.getSeconds()*6)+'deg)';
document.getElementById('minuteHand').style.transform='rotate('+(n.getMinutes()*6+n.getSeconds()*0.1)+'deg)';
document.getElementById('hourHand').style.transform='rotate('+((n.getHours()%12)*30+n.getMinutes()*0.5)+'deg)';
document.getElementById('digitalTime').textContent=n.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
document.getElementById('digitalDate').textContent=n.toLocaleDateString('tr-TR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}
tick();setInterval(tick,1000);

var cd=new Date();
function cal(){
var y=cd.getFullYear(),m=cd.getMonth();
document.getElementById('monthYear').textContent=aylar[m]+' '+y;
var g=document.getElementById('calGrid');g.innerHTML='';
var fd=new Date(y,m,1),sd=fd.getDay()-1;if(sd<0)sd=6;
var pl=new Date(y,m,0).getDate();
for(var i=sd-1;i>=0;i--){var d=document.createElement('div');d.className='cal-day other';d.textContent=pl-i;g.appendChild(d)}
var t=new Date(),ld=new Date(y,m+1,0).getDate();
for(var i=1;i<=ld;i++){var d=document.createElement('div');d.className='cal-day'+(i===t.getDate()&&m===t.getMonth()&&y===t.getFullYear()?' today':'');d.textContent=i;g.appendChild(d)}
for(var i=g.children.length;i<42;i++){var d=document.createElement('div');d.className='cal-day other';d.textContent=i-ld+1;g.appendChild(d)}
}
cal();
document.getElementById('prevMonth').addEventListener('click',function(){cd.setMonth(cd.getMonth()-1);cal()});
document.getElementById('nextMonth').addEventListener('click',function(){cd.setMonth(cd.getMonth()+1);cal()});

// TEMA + OPAKLIK POLLING
setInterval(async function(){try{var t=await window.plasmaAPI.getTheme()||'dark';var a=await window.plasmaAPI.getAccentColor()||'#00d4ff';var o=parseFloat(await window.plasmaAPI.getStoreValue('opacity'))||88;var bg={dark:'#1e1e23',light:'#e8e8e8',catppuccin:'#1e1e2e',nord:'#2e3440',dracula:'#282a36'};var wbg={dark:'#252529',light:'#f5f5f5',catppuccin:'#252536',nord:'#3b4252',dracula:'#343746'};document.body.style.background=bg[t]||bg.dark;var w=document.querySelector('.widget');if(w)w.style.background=wbg[t]||wbg.dark;document.body.style.opacity=o/100;if(a)document.documentElement.style.setProperty('--accent',a)}catch(e){}},2000);
</script>
</body>
</html>
