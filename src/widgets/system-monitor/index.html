<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Sistem Monitörü</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e23;font-family:-apple-system,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.widget{background:#252529;border-radius:16px;border:1px solid rgba(255,255,255,0.06);padding:16px;width:calc(100% - 4px);height:calc(100% - 4px);display:flex;flex-direction:column;gap:6px;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.drag-btn{width:28px;height:28px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.3);border-radius:8px;cursor:grab;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.drag-btn:hover{background:rgba(0,212,255,0.15);color:#00d4ff}
.title{flex:1;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.8px;text-align:center}
.close-btn{width:28px;height:28px;border:none;background:rgba(255,77,77,0.1);color:rgba(255,77,77,0.5);border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.close-btn:hover{background:rgba(255,77,77,0.3);color:#ff4d4d}
.stat{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:10px}
.stat-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.stat-info{flex:1}
.stat-label{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px}
.stat-bar{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width .5s}
.stat-value{font-size:13px;font-weight:500;min-width:40px;text-align:right}
</style>
</head>
<body>
<div class="widget" id="widget">
<div class="header">
<div class="drag-btn" id="dragBtn"><svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="pointer-events:none"><circle cx="8" cy="5" r="1.5"/><circle cx="16" cy="5" r="1.5"/><circle cx="8" cy="12" r="1.5"/><circle cx="16" cy="12" r="1.5"/><circle cx="8" cy="19" r="1.5"/><circle cx="16" cy="19" r="1.5"/></svg></div>
<div class="title">Sistem</div>
<button class="close-btn" id="closeBtn">&#10005;</button>
</div>
<div id="stats"></div>
</div>
<script src="../../tauri-bridge.js"></script>
<script>
(function(){var b=document.getElementById('dragBtn');if(!b)return;var d=false,sx=0,sy=0,ox=NaN,oy=NaN;b.addEventListener('mousedown',function(e){e.preventDefault();d=true;sx=e.screenX;sy=e.screenY;ox=NaN;b.classList.add('active');window.plasmaAPI.getWindowPosition().then(function(p){ox=p.x-sx;oy=p.y-sy}).catch(function(){})});document.addEventListener('mousemove',function(e){if(!d||isNaN(ox))return;window.plasmaAPI.moveWindow(e.screenX+ox,e.screenY+oy)});document.addEventListener('mouseup',function(){if(!d)return;d=false;b.classList.remove('active')})})();
document.getElementById('closeBtn').addEventListener('click',function(){window.plasmaAPI.closeWidget('system-monitor')});
(function(){var c=document.createElement('div');c.style.cssText='position:fixed;right:0;bottom:0;width:10px;height:10px;cursor:nwse-resize;z-index:999';document.body.appendChild(c);var r=document.createElement('div');r.style.cssText='position:fixed;right:0;top:0;width:5px;height:100%;cursor:ew-resize;z-index:999';document.body.appendChild(r);var b2=document.createElement('div');b2.style.cssText='position:fixed;bottom:0;left:0;width:100%;height:5px;cursor:ns-resize;z-index:999';document.body.appendChild(b2);var rs=false,rsx=0,rsy=0,row=0,roh=0,rt='none';c.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='corner';e.preventDefault()});r.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='right';e.preventDefault()});b2.addEventListener('mousedown',function(e){rs=true;rsx=e.screenX;rsy=e.screenY;row=window.innerWidth;roh=window.innerHeight;rt='bottom';e.preventDefault()});document.addEventListener('mousemove',function(e){if(!rs)return;var dx=e.screenX-rsx,dy=e.screenY-rsy;window.plasmaAPI.setWindowSize('widget-system-monitor',rt==='corner'||rt==='right'?Math.max(200,row+dx):row,rt==='corner'||rt==='bottom'?Math.max(250,roh+dy):roh)});document.addEventListener('mouseup',function(){rs=false})})();

var stats=[
{id:'cpu',icon:'⚡',label:'CPU',color:'#00d4ff'},
{id:'mem',icon:'🧠',label:'RAM',color:'#a855f7'},
{id:'disk',icon:'💾',label:'Disk',color:'#22c55e'},
{id:'net',icon:'🌐',label:'Ağ',color:'#f59e0b'},
{id:'bat',icon:'🔋',label:'Pil',color:'#ec4899'}
];

var el=document.getElementById('stats');
stats.forEach(function(s){
var div=document.createElement('div');div.className='stat';div.id='stat-'+s.id;
div.innerHTML='<div class="stat-icon" style="background:'+s.color+'22;color:'+s.color+'">'+s.icon+'</div><div class="stat-info"><div class="stat-label">'+s.label+'</div><div class="stat-bar"><div class="stat-fill" id="fill-'+s.id+'" style="width:0%;background:'+s.color+'"></div></div></div><div class="stat-value" id="val-'+s.id+'" style="color:'+s.color+'">-</div>';
el.appendChild(div);
});

async function update(){
try{
var cpu=await window.plasmaAPI.getCpuLoad();
var mem=await window.plasmaAPI.getMemory();
var disk=await window.plasmaAPI.getDisk();
var net=await window.plasmaAPI.getNetwork();
var bat=await window.plasmaAPI.getBattery();

var cpup=cpu?parseFloat((cpu.currentLoad||0).toFixed(1)):0;
document.getElementById('fill-cpu').style.width=Math.min(cpup,100)+'%';
document.getElementById('val-cpu').textContent=cpup+'%';

var memp=mem?mem.usedPercent||0:0;
document.getElementById('fill-mem').style.width=Math.min(memp,100)+'%';
document.getElementById('val-mem').textContent=Math.round(memp)+'%';

var diskp=disk&&disk[0]?disk[0].usedPercent||0:0;
document.getElementById('fill-disk').style.width=Math.min(diskp,100)+'%';
document.getElementById('val-disk').textContent=Math.round(diskp)+'%';

var nets=net&&net.stats&&net.stats[0]?net.stats[0].rx_sec||0:0;
document.getElementById('val-net').textContent=nets>1024?Math.round(nets/1024)+'MB/s':Math.round(nets/1024)+'kB/s';
document.getElementById('fill-net').style.width='30%';

var batl=bat&&bat.level!==undefined?bat.level:null;
document.getElementById('val-bat').textContent=batl!==null?batl+'%'+(bat.charging?' ⚡':''):'-';
document.getElementById('fill-bat').style.width=batl!==null?batl+'%':'0%';
}catch(e){}
}
update();setInterval(update,3000);

setInterval(async function(){try{var t=await window.plasmaAPI.getTheme()||'dark';var a=await window.plasmaAPI.getAccentColor()||'#00d4ff';var o=parseFloat(await window.plasmaAPI.getStoreValue('opacity'))||88;var bg={dark:'#1e1e23',light:'#e8e8e8',catppuccin:'#1e1e2e',nord:'#2e3440',dracula:'#282a36'};var wbg={dark:'#252529',light:'#f5f5f5',catppuccin:'#252536',nord:'#3b4252',dracula:'#343746'};document.body.style.background=bg[t]||bg.dark;var w=document.querySelector('.widget');if(w)w.style.background=wbg[t]||wbg.dark;document.body.style.opacity=o/100}catch(e){}},2000);
</script>
</body>
</html>
