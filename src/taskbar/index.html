<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>detbar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
      height: 100vh;
    }
    .taskbar {
      display: flex;
      align-items: center;
      height: calc(100% - 8px);
      margin: 4px;
      padding: 0 12px;
      background: var(--bg-card, #1e1e23);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      gap: 6px;
    }
    .taskbar-left, .taskbar-right {
      flex-direction: column;
      width: calc(100% - 8px);
      height: auto;
      padding: 12px 4px;
      justify-content: flex-start;
    }
    .taskbar-left .search-bar, .taskbar-right .search-bar { width: 32px; min-width: 32px; height: 32px; padding: 0; justify-content: center; }
    .taskbar-left .search-bar input, .taskbar-right .search-bar input { width: 0; height: 0; padding: 0; }
    .taskbar-left .search-icon, .taskbar-right .search-icon { margin: 0; }
    .taskbar-left .system-tray, .taskbar-right .system-tray { margin: 0; flex-direction: column; padding: 10px 0; }
    .taskbar-left .clock, .taskbar-right .clock { writing-mode: vertical-lr; text-orientation: mixed; min-width: auto; font-size: 11px; }
    .taskbar-left .pinned-apps, .taskbar-right .pinned-apps { flex-direction: column; }
    .taskbar-left .widget-buttons, .taskbar-right .widget-buttons { flex-direction: column; }
    .taskbar-left .running-apps, .taskbar-right .running-apps { flex-direction: column; padding: 6px 0; }
    .taskbar-top {
      height: calc(100% - 8px);
      width: auto;
    }
    .taskbar-top .system-tray { margin-left: auto; }
    .search-bar {
      display: flex; align-items: center; height: 32px; padding: 0 12px;
      background: rgba(255,255,255,0.08); border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); min-width: 160px;
    }
    .search-icon { color: var(--text-dim, #888); margin-right: 8px; flex-shrink: 0; }
    .search-bar input { background: transparent; border: none; outline: none; color: var(--text, #fff); font-size: 13px; width: 100%; }
    .search-bar input::placeholder { color: #666; }
    .pinned-apps { display: flex; align-items: center; gap: 4px; }
    .app-button {
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      border-radius: 10px; cursor: pointer; color: var(--text-dim, #b0b0b0); transition: all 0.2s;
    }
    .app-button:hover { background: rgba(255,255,255,0.1); color: var(--text, #fff); }
    .running-apps { display: flex; align-items: center; gap: 4px; flex: 1; padding: 0 6px; }
    .widget-buttons { display: flex; align-items: center; gap: 2px; }
    .widget-toggle {
      width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; cursor: pointer; color: var(--text-dim, #888); transition: all 0.2s;
    }
    .widget-toggle:hover { background: rgba(255,255,255,0.1); color: var(--text, #fff); }
    .widget-toggle.active { background: rgba(0,212,255,0.2); color: var(--accent, #00d4ff); }
    .system-tray { display: flex; align-items: center; gap: 10px; margin-left: auto; padding: 0 10px; }
    .tray-icons { display: flex; align-items: center; gap: 6px; }
    .tray-icon {
      width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-dim, #b0b0b0); border-radius: 6px;
    }
    .tray-icon:hover { color: var(--text, #fff); background: rgba(255,255,255,0.1); }
    .clock { color: var(--text, #e0e0e0); font-size: 12px; font-weight: 500; white-space: nowrap; min-width: 120px; }
    .settings-button {
      width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
      border-radius: 10px; cursor: pointer; color: var(--text-dim, #888); transition: all 0.2s;
    }
    .settings-button:hover { background: rgba(255,255,255,0.1); color: var(--text, #fff); }
  </style>
</head>
<body>
  <div class="taskbar">
    <div class="search-bar" id="searchBar">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor" class="search-icon">
        <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text" placeholder="Ara..." id="searchInput">
    </div>
    <div class="pinned-apps" id="pinnedApps">
      <div class="app-button" data-app="explorer" title="Dosya Gezgini">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
        </svg>
      </div>
      <div class="app-button" data-app="browser" title="Tarayıcı">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
      </div>
      <div class="app-button" data-app="terminal" title="Terminal">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M20 19.59V8l-6-6H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c.45 0 .85-.15 1.19-.4l-4.43-4.43c-.8.52-1.74.83-2.76.83-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5c0 1.02-.31 1.96-.83 2.75L20 19.59zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/>
        </svg>
      </div>
    </div>
    <div class="running-apps" id="runningApps"></div>
    <div class="widget-buttons" id="widgetButtons">
      <div class="widget-toggle" data-widget="system-monitor" title="Sistem Monitörü">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
        </svg>
      </div>
      <div class="widget-toggle" data-widget="notes" title="Notlar">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M3 18h12v-2H3v2zM3 6v2h18V6H3zm0 7h18v-2H3v2z"/>
        </svg>
      </div>
      <div class="widget-toggle" data-widget="music-player" title="Müzik Player">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
    </div>
    <div class="system-tray" id="systemTray">
      <div class="tray-icons">
        <div class="tray-icon" id="networkIcon" title="Ağ">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/>
          </svg>
        </div>
        <div class="tray-icon" id="volumeIcon" title="Ses">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
          </svg>
        </div>
      </div>
      <div class="clock" id="clock"></div>
    </div>
    <div class="settings-button" id="settingsBtn" title="Ayarlar (Ctrl+Alt+T)">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
      </svg>
    </div>
  </div>
  <script src="../tauri-bridge.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
